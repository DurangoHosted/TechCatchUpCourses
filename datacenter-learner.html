          { q: "Which change type requires a rollback plan as a mandatory component?", options: ["Standard changes only, since they are pre-approved", "Emergency changes only, since they are time-critical", "All change types — every change request must include a rollback plan", "Normal changes only, since they go through CAB review"], correct: 2 },
          { q: "What should you do if something unexpected happens during a change implementation?", options: ["Complete the change as quickly as possible to minimize the maintenance window", "Stop the change and escalate — do not proceed without guidance", "Document it afterward in the ticket but continue the change", "Contact the end user and ask if they want you to continue"], correct: 1 }

          { type: "heading", text: "Key Tools" },

          { type: "heading", text: "Alert Triage Process" },
          { type: "bullets", items: ["1. Acknowledge the alert (stops escalation)", "2. Assess severity — critical / warning / informational", "3. Gather data before touching anything", "4. Consult runbooks for known issue procedures", "5. Escalate if outside your scope", "6. Document all findings in the ticket"] }
        ],
        quiz: [
          { q: "What does DCIM stand for?", options: ["Data Center Interface Module", "Distributed Computing Infrastructure Manager", "Data Center Infrastructure Management", "Dynamic Circuit and Infrastructure Monitor"], correct: 2 },
          { q: "What is the correct first action when you receive a critical alert?", options: ["Immediately begin making changes to resolve the issue before it escalates further", "Acknowledge the alert to stop escalation, then begin assessment", "Call the on-call manager before doing anything else", "Check if other team members have already seen the alert before responding"], correct: 1 },
          { q: "What type of sensor is typically placed under the raised floor near cooling units?", options: ["Temperature and humidity sensors to optimize airflow distribution", "Water/leak detection sensors to catch cooling leaks before equipment damage", "Vibration sensors to detect physical impact to floor tiles", "Airflow pressure sensors to measure CRAC unit output velocity"], correct: 1 }
        ]
      },

        content: [

          { type: "bullets", items: ["SEV1/P1: Production down, critical impact — Immediate response.", "SEV2/P2: Major degradation, workaround exists — 15–30 min response.", "SEV3/P3: Minor impact, non-critical — 2–4 hour response.", "SEV4/P4: Informational, cosmetic — Next business day."] },
          { type: "heading", text: "The ITIL Incident Process" },

          { type: "bullets", items: ["Escalate when: 15+ minutes without P1 progress, issue is outside your domain, unauthorized action is needed.", "PIR (Post-Incident Review): Blameless review after significant incidents. Goal is process improvement, not punishment.", "Communication rule: Use timestamps, give factual status updates, notify stakeholders even with no new info."] }
        ],
        quiz: [
          { q: "What is a runbook?", options: ["A log of all completed maintenance tasks for the current quarter", "A pre-written step-by-step procedure for responding to a known incident or operational task", "A script that automatically resolves common server alerts without human intervention", "A vendor document listing hardware specifications and warranty terms"], correct: 1 },
          { q: "When should you escalate a P1 incident?", options: ["Only after you have fully exhausted all possible solutions yourself", "After approximately 15 minutes without progress, when outside your domain, or when safety is uncertain", "Only when explicitly directed to by your manager", "After the incident has been open for more than 1 hour"], correct: 1 },
          { q: "What is the purpose of a Post-Incident Review (PIR)?", options: ["To identify and formally discipline the staff member responsible for the outage", "A blameless review to identify root causes and improve processes to prevent recurrence", "To calculate the financial cost of the incident for insurance claims", "To review whether the SLA was breached and notify affected customers"], correct: 1 }
        ]
      },
      {
        day: 15, title: "Certifications & Career Path", duration: "15 min", xp: 150,
        content: [
          { type: "heading", text: "Tier 1 Certifications — Get These First" },
          { type: "bullets", items: ["CompTIA Server+: Most directly relevant to DC tech work. Covers hardware, storage, networking, troubleshooting. ~$370 exam.", "CompTIA Network+: Validates networking fundamentals essential for DC floor work.", "OSHA 10 (General Industry): Safety certification required or preferred by most DCs. ~$60, completed online."] },

        ],

          { q: "What is a recommended first home lab server for a DC tech student on a budget?", options: ["A Mac Pro — because it supports ECC RAM and has good expansion", "A Dell PowerEdge R620 or R630 — available for ~$150–$200 on eBay, supports iDRAC, RAID, and ESXi", "A Raspberry Pi cluster — because it teaches distributed computing at low cost", "A desktop workstation with a RAID card — because it's cheaper than a server"], correct: 1 },
          { q: "Which certification is the gold standard for networking and opens the most doors for DC tech advancement?", options: ["CompTIA Network+ — because it's vendor-neutral and widely recognized", "Cisco CCNA — because it validates practical networking skills at an industry-recognized level", "VMware VCP — because virtualization is the most in-demand DC skill", "OSHA 10 — because safety certifications are required by all employers"], correct: 1 }

  }
];

const allLessons = curriculum.flatMap(w => w.lessons);
const TOTAL_QUESTIONS = allLessons.reduce((sum, l) => sum + l.quiz.length, 0);

function renderContent(blocks) {
  return blocks.map((block, i) => {
    if (block.type === 'body') return <p key={i} style={{ fontSize: 13, lineHeight: 1.8, color: '#a0b4c8', marginBottom: 14 }}>{block.text}</p>;
    if (block.type === 'heading') return <p key={i} style={{ fontWeight: 700, color: '#00d4ff', marginTop: 18, marginBottom: 8, fontSize: 13, letterSpacing: '0.04em' }}>▸ {block.text}</p>;
    if (block.type === 'bullets') return (
      <ul key={i} style={{ listStyle: 'none', marginBottom: 12 }}>
        {block.items.map((item, j) => {
          const parts = item.split(/\*\*(.*?)\*\*/g);
          return <li key={j} style={{ display: 'flex', gap: 8, marginBottom: 5, fontSize: 13, lineHeight: 1.6 }}>
            <span style={{ color: '#00d4ff', flexShrink: 0 }}>›</span>
            <span>{parts.map((p, k) => k % 2 === 1 ? <strong key={k} style={{ color: '#00ffea' }}>{p}</strong> : p)}</span>
          </li>;
        })}
      </ul>
    );
    return null;
  });
}

function App() {
  const [currentLesson, setCurrentLesson] = useState(null);
  const [completedLessons, setCompletedLessons] = useState({});
  const [quizIndex, setQuizIndex] = useState(0);
  const [selectedOption, setSelectedOption] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [totalXP, setTotalXP] = useState(0);
  const [totalCorrect, setTotalCorrect] = useState(0);
  const [view, setView] = useState('dashboard');
  const [studentName, setStudentName] = useState('');
  const [studentEmail, setStudentEmail] = useState('');
  const [formSubmitted, setFormSubmitted] = useState(false);
  const [formError, setFormError] = useState('');

  const completedCount = Object.keys(completedLessons).length;
  const progress = (completedCount / allLessons.length) * 100;
  const allDone = completedCount === allLessons.length;

  const openLesson = (lesson) => {
    setCurrentLesson(lesson);
    setQuizIndex(0);
    setSelectedOption(null);
    setAnswered(false);
    setView('lesson');
  };

  const startQuiz = () => {
    setQuizIndex(0);
    setSelectedOption(null);
    setAnswered(false);
    setView('quiz');
  };

  const handleOptionSelect = (idx) => {
    if (answered) return;
    setSelectedOption(idx);
    setAnswered(true);
    const correct = idx === currentLesson.quiz[quizIndex].correct;
    if (correct) setTotalCorrect(c => c + 1);
  };

  const nextQuestion = () => {
    if (quizIndex < currentLesson.quiz.length - 1) {
      setQuizIndex(q => q + 1);
      setSelectedOption(null);
      setAnswered(false);
    } else {
      if (!completedLessons[currentLesson.day]) {
        const lessonScore = currentLesson.quiz.reduce((acc, _, qi) => acc, 0);
        setCompletedLessons(p => ({ ...p, [currentLesson.day]: true }));
        setTotalXP(x => x + currentLesson.xp);
      }
      setView('complete');
    }
  };

  const buildBreakdown = () => {
    return allLessons.map(l => `Day ${l.day}: ${completedLessons[l.day] ? 'Complete' : 'Incomplete'}`).join(' | ');
  };

  const submitToGoogleForm = (e) => {
    e.preventDefault();
    if (!studentName.trim() || !studentEmail.trim()) {
      setFormError('Please enter your name and email before submitting.');
      return;
    }
    if (studentEmail.trim().length < 3) {
      setFormError('Please enter a valid Student Login ID.');
      return;
    }
    setFormError('');

    const cfg = GOOGLE_FORM_CONFIG;
    const formUrl = `https://docs.google.com/forms/d/${cfg.formId}/formResponse`;
    const params = new URLSearchParams({
      [cfg.fields.studentName]: studentName,
      [cfg.fields.studentLoginId]: studentEmail,
      [cfg.fields.totalScore]: totalCorrect,
      [cfg.fields.totalPossible]: TOTAL_QUESTIONS,
      [cfg.fields.lessonBreakdown]: buildBreakdown(),
      [cfg.fields.completionDate]: new Date().toLocaleDateString('en-US')
    });

    // Submit via hidden iframe to avoid navigation
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.name = 'hidden_iframe';
    document.body.appendChild(iframe);
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = formUrl;
    form.target = 'hidden_iframe';
    params.forEach((val, key) => {
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = key;
      input.value = val;
      form.appendChild(input);
    });
    document.body.appendChild(form);
    form.submit();
    setTimeout(() => {
      document.body.removeChild(form);
      document.body.removeChild(iframe);
    }, 3000);

    setFormSubmitted(true);
  };

  // ── DASHBOARD ──
  if (view === 'dashboard') return (
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", background: '#0a0f1a', minHeight: '100vh', color: '#c8d6e5' }}>
      <div style={{ borderBottom: '1px solid #00d4ff22', padding: '20px 24px 16px', background: '#060b14' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12 }}>
          <div>
            <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 11, letterSpacing: '0.25em', color: '#00d4ff99', marginBottom: 4 }}>TECH CATCH UP COURSES</div>
            <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 20, fontWeight: 900, color: '#00d4ff' }}>DATA CENTER TECH</div>
            <div style={{ fontSize: 11, color: '#5a7a9a', marginTop: 2 }}>15-Minute Daily Lessons · 3-Week Curriculum</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 11, color: '#5a7a9a' }}>SCORE</div>
            <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 24, fontWeight: 900, color: '#00d4ff' }}>{totalCorrect} / {TOTAL_QUESTIONS}</div>
            <div style={{ fontSize: 11, color: '#5a7a9a' }}>{completedCount} / {allLessons.length} lessons · {totalXP} XP</div>
          </div>
        </div>
        <div style={{ marginTop: 14, height: 4, background: '#0f1e2e', borderRadius: 2, overflow: 'hidden' }}>
          <div className="progress-bar-inner" style={{ height: '100%', width: `${progress}%`, background: 'linear-gradient(90deg,#00d4ff,#00ffea)', borderRadius: 2 }} />
        </div>
        {allDone && (
          <div style={{ marginTop: 12, padding: '10px 14px', background: '#0a2a0a', border: '1px solid #00c85344', borderRadius: 4, display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 8 }}>
            <span style={{ fontSize: 12, color: '#69f0ae' }}>✓ All 15 lessons complete — submit your results for course credit</span>
            <button className="btn-primary" onClick={() => setView('submit')} style={{ padding: '6px 16px', fontSize: 11, borderRadius: 2, background: '#00c853', color: '#0a0f1a' }}>SUBMIT RESULTS →</button>
          </div>
        )}
      </div>

      <div style={{ padding: '20px 24px', maxWidth: 900, margin: '0 auto' }}>
        {curriculum.map(week => (
          <div key={week.week} style={{ marginBottom: 30 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
              <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 10, letterSpacing: '0.2em', color: '#00d4ff66', border: '1px solid #00d4ff22', padding: '3px 8px', borderRadius: 2 }}>WEEK {week.week}</div>
              <div style={{ fontSize: 13, fontWeight: 600, color: '#8ab4d4' }}>{week.theme}</div>
              <div style={{ flex: 1, height: 1, background: '#00d4ff11' }} />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(250px,1fr))', gap: 10 }}>
              {week.lessons.map(lesson => {
                const done = !!completedLessons[lesson.day];
                return (
                  <div key={lesson.day} className="lesson-card" onClick={() => openLesson(lesson)}
                    style={{ border: `1px solid ${done ? '#00d4ff44' : '#1a2a3a'}`, borderRadius: 4, padding: '14px 16px', background: done ? '#0a1a24' : '#0d1420', position: 'relative', overflow: 'hidden' }}>
                    {done && <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 2, background: 'linear-gradient(90deg,#00d4ff,#00ffea)' }} />}
                    <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                      <span style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 10, color: done ? '#00d4ff' : '#2a4a6a', fontWeight: 700 }}>DAY {lesson.day}</span>
                      {done ? <span style={{ fontSize: 10, color: '#00c853' }}>✓ COMPLETE</span> : <span style={{ fontSize: 10, color: '#2a4a6a' }}>{lesson.xp} XP</span>}
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: done ? '#c8d6e5' : '#8ab4d4', marginTop: 6, lineHeight: 1.4 }}>{lesson.title}</div>
                    <div style={{ fontSize: 11, color: '#3a5a7a', marginTop: 6 }}>{lesson.duration} · {lesson.quiz.length} questions</div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  // ── LESSON ──
  if (view === 'lesson' && currentLesson) return (
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", background: '#0a0f1a', minHeight: '100vh', color: '#c8d6e5' }}>
      <div style={{ borderBottom: '1px solid #00d4ff22', padding: '14px 24px', background: '#060b14', display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap' }}>
        <button className="btn-ghost" onClick={() => setView('dashboard')} style={{ padding: '6px 12px', fontSize: 11, borderRadius: 2 }}>← BACK</button>
        <div style={{ flex: 1 }}>
          <span style={{ fontSize: 10, color: '#00d4ff66', letterSpacing: '0.15em' }}>DAY {currentLesson.day} · {currentLesson.duration}</span>
          <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 14, color: '#00d4ff', marginTop: 2 }}>{currentLesson.title}</div>
        </div>
        <button className="btn-primary" onClick={startQuiz} style={{ padding: '8px 18px', fontSize: 12, borderRadius: 2 }}>START QUIZ →</button>
      </div>
      <div style={{ maxWidth: 700, margin: '0 auto', padding: '28px 24px', fontSize: 13, lineHeight: 1.7 }}>
        {renderContent(currentLesson.content)}
        <div style={{ marginTop: 32, paddingTop: 20, borderTop: '1px solid #1a2a3a' }}>
          <button className="btn-primary" onClick={startQuiz} style={{ padding: '10px 24px', fontSize: 13, borderRadius: 2, width: '100%' }}>TEST YOUR KNOWLEDGE →</button>
        </div>
      </div>
    </div>
  );

  // ── QUIZ ──
  if (view === 'quiz' && currentLesson) {
    const q = currentLesson.quiz[quizIndex];
    return (
      <div style={{ fontFamily: "'IBM Plex Mono', monospace", background: '#0a0f1a', minHeight: '100vh', color: '#c8d6e5' }}>
        <div style={{ borderBottom: '1px solid #00d4ff22', padding: '14px 24px', background: '#060b14', display: 'flex', alignItems: 'center', gap: 16 }}>
          <button className="btn-ghost" onClick={() => setView('lesson')} style={{ padding: '6px 12px', fontSize: 11, borderRadius: 2 }}>← LESSON</button>
          <div style={{ flex: 1 }}>
            <span style={{ fontSize: 10, color: '#00d4ff66', letterSpacing: '0.15em' }}>QUIZ · DAY {currentLesson.day}</span>
            <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 13, color: '#00d4ff', marginTop: 2 }}>{currentLesson.title}</div>
          </div>
          <span style={{ fontSize: 12, color: '#5a7a9a' }}>{quizIndex + 1} / {currentLesson.quiz.length}</span>
        </div>
        <div style={{ maxWidth: 660, margin: '40px auto', padding: '0 24px' }}>
          <div style={{ fontSize: 10, letterSpacing: '0.2em', color: '#00d4ff66', marginBottom: 16 }}>QUESTION {quizIndex + 1} OF {currentLesson.quiz.length}</div>
          <div style={{ fontSize: 15, fontWeight: 600, color: '#c8d6e5', lineHeight: 1.5, marginBottom: 28 }}>{q.question || q.q}</div>

          {q.options.map((opt, idx) => {
            let cls = 'option-btn';
            if (answered) {
              if (idx === q.correct) cls += ' option-correct';
              else if (idx === selectedOption && idx !== q.correct) cls += ' option-wrong';
            }
            return (
              <button key={idx} className={cls} onClick={() => handleOptionSelect(idx)} disabled={answered}>
                <span style={{ color: answered ? 'inherit' : '#5a7a9a', marginRight: 10, fontWeight: 700 }}>{String.fromCharCode(65 + idx)}.</span>
                {opt}
                {answered && idx === q.correct && <span style={{ float: 'right', marginLeft: 8 }}>✓</span>}
                {answered && idx === selectedOption && idx !== q.correct && <span style={{ float: 'right', marginLeft: 8 }}>✗</span>}
              </button>
            );
          })}

          {answered && (
            <div style={{ marginTop: 16, padding: '12px 16px', background: selectedOption === q.correct ? '#0a2a0a' : '#2a0a0a', border: `1px solid ${selectedOption === q.correct ? '#00c85344' : '#ff174444'}`, borderRadius: 4, marginBottom: 20 }}>
              <div style={{ fontSize: 12, color: selectedOption === q.correct ? '#69f0ae' : '#ff8a80', fontWeight: 700, marginBottom: 4 }}>
                {selectedOption === q.correct ? '✓ CORRECT' : '✗ INCORRECT'}
              </div>
              {selectedOption !== q.correct && (
                <div style={{ fontSize: 12, color: '#8ab4d4' }}>Correct answer: <strong style={{ color: '#69f0ae' }}>{q.options[q.correct]}</strong></div>
              )}
            </div>
          )}

          {answered && (
            <button className="btn-primary" onClick={nextQuestion} style={{ padding: '12px 28px', fontSize: 13, borderRadius: 2, width: '100%' }}>
              {quizIndex < currentLesson.quiz.length - 1 ? 'NEXT QUESTION →' : 'COMPLETE LESSON ✓'}
            </button>
          )}
        </div>
      </div>
    );
  }

  // ── LESSON COMPLETE ──
  if (view === 'complete') return (
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", background: '#0a0f1a', minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ textAlign: 'center', padding: 40, maxWidth: 480 }}>
        <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 52, color: '#00d4ff', marginBottom: 12 }}>✓</div>
        <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 18, color: '#00d4ff', marginBottom: 8 }}>LESSON COMPLETE</div>
        <div style={{ fontSize: 13, color: '#8ab4d4', marginBottom: 4 }}>{currentLesson?.title}</div>
        <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 30, color: '#00ffea', margin: '20px 0' }}>+{currentLesson?.xp} XP</div>
        <div style={{ fontSize: 12, color: '#5a7a9a', marginBottom: 8 }}>Overall Score: {totalCorrect} / {TOTAL_QUESTIONS} correct</div>
        <div style={{ fontSize: 12, color: '#5a7a9a', marginBottom: 32 }}>{completedCount} / {allLessons.length} lessons complete</div>
        {completedCount === allLessons.length && (
          <div style={{ marginBottom: 20, padding: '12px', background: '#0a2a0a', border: '1px solid #00c85344', borderRadius: 4 }}>
            <div style={{ fontSize: 12, color: '#69f0ae', marginBottom: 8 }}>🎓 All lessons complete! Submit your results for course credit.</div>
            <button className="btn-primary" onClick={() => setView('submit')} style={{ padding: '8px 20px', fontSize: 12, borderRadius: 2, background: '#00c853', color: '#0a0f1a' }}>SUBMIT FOR CREDIT →</button>
          </div>
        )}
        <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
          <button className="btn-primary" onClick={() => setView('dashboard')} style={{ padding: '12px 28px', fontSize: 13, borderRadius: 2 }}>← CURRICULUM</button>
          {currentLesson && currentLesson.day < allLessons.length && (
            <button className="btn-primary" onClick={() => openLesson(allLessons[currentLesson.day])} style={{ padding: '12px 28px', fontSize: 13, borderRadius: 2, background: '#00ffea', color: '#0a0f1a' }}>NEXT LESSON →</button>
          )}
        </div>
      </div>
    </div>
  );

  // ── SUBMISSION FORM ──
  if (view === 'submit') return (
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", background: '#0a0f1a', minHeight: '100vh', color: '#c8d6e5' }}>
      <div style={{ borderBottom: '1px solid #00d4ff22', padding: '14px 24px', background: '#060b14', display: 'flex', alignItems: 'center', gap: 16 }}>
        <button className="btn-ghost" onClick={() => setView('dashboard')} style={{ padding: '6px 12px', fontSize: 11, borderRadius: 2 }}>← BACK</button>
        <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 14, color: '#00d4ff' }}>SUBMIT COURSE RESULTS</div>
      </div>

      <div style={{ maxWidth: 560, margin: '40px auto', padding: '0 24px' }}>
        {!formSubmitted ? (
          <>
            <div style={{ marginBottom: 32, padding: '20px', background: '#060b14', border: '1px solid #00d4ff22', borderRadius: 4 }}>
              <div style={{ fontSize: 10, color: '#00d4ff66', letterSpacing: '0.15em', marginBottom: 12 }}>YOUR RESULTS SUMMARY</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                <div style={{ padding: '10px', background: '#0a1a24', borderRadius: 4, textAlign: 'center' }}>
                  <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 24, color: '#00d4ff' }}>{totalCorrect}/{TOTAL_QUESTIONS}</div>
                  <div style={{ fontSize: 10, color: '#5a7a9a', marginTop: 4 }}>QUESTIONS CORRECT</div>
                </div>
                <div style={{ padding: '10px', background: '#0a1a24', borderRadius: 4, textAlign: 'center' }}>
                  <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 24, color: '#00ffea' }}>{Math.round((totalCorrect / TOTAL_QUESTIONS) * 100)}%</div>
                  <div style={{ fontSize: 10, color: '#5a7a9a', marginTop: 4 }}>FINAL SCORE</div>
                </div>
                <div style={{ padding: '10px', background: '#0a1a24', borderRadius: 4, textAlign: 'center' }}>
                  <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 24, color: '#00d4ff' }}>{totalXP}</div>
                  <div style={{ fontSize: 10, color: '#5a7a9a', marginTop: 4 }}>TOTAL XP EARNED</div>
                </div>
                <div style={{ padding: '10px', background: '#0a1a24', borderRadius: 4, textAlign: 'center' }}>
                  <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 24, color: '#69f0ae' }}>{completedCount}/15</div>
                  <div style={{ fontSize: 10, color: '#5a7a9a', marginTop: 4 }}>LESSONS COMPLETE</div>
                </div>
              </div>
            </div>

            <div style={{ marginBottom: 12 }}>
              <label style={{ fontSize: 11, color: '#5a7a9a', letterSpacing: '0.1em', display: 'block', marginBottom: 6 }}>YOUR FIRST NAME</label>
              <input type="text" placeholder="First Name Only" value={studentName} onChange={e => setStudentName(e.target.value)} />
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ fontSize: 11, color: '#5a7a9a', letterSpacing: '0.1em', display: 'block', marginBottom: 6 }}>YOUR STUDENT LOGIN ID</label>
              <input type="text" placeholder="Student Login ID" value={studentEmail} onChange={e => setStudentEmail(e.target.value)} />
            </div>

            {formError && <div style={{ marginBottom: 16, padding: '10px 14px', background: '#2a0a0a', border: '1px solid #ff174444', borderRadius: 4, fontSize: 12, color: '#ff8a80' }}>{formError}</div>}

            <div style={{ marginBottom: 20, padding: '10px 14px', background: '#0a1420', border: '1px solid #1a2a3a', borderRadius: 4, fontSize: 11, color: '#5a7a9a', lineHeight: 1.6 }}>
              Your first name, student login ID, score, and lesson completion record will be submitted to your instructor for course credit and Arizona Department of Education reporting. No additional personal information is collected or stored.
            </div>

            <button className="btn-primary" onClick={submitToGoogleForm} style={{ padding: '12px', fontSize: 13, borderRadius: 2, width: '100%' }}>
              SUBMIT RESULTS FOR COURSE CREDIT →
            </button>
          </>
        ) : (
          <div style={{ textAlign: 'center', padding: '40px 20px' }}>
            <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 52, color: '#69f0ae', marginBottom: 16 }}>🎓</div>
            <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 20, color: '#69f0ae', marginBottom: 12 }}>SUBMISSION COMPLETE</div>
            <div style={{ fontSize: 13, color: '#8ab4d4', marginBottom: 24, lineHeight: 1.7 }}>
              Your results have been submitted successfully.<br/>
              <strong style={{ color: '#c8d6e5' }}>{studentName}</strong> · Login ID: {studentEmail}
            </div>
            <div style={{ padding: '20px', background: '#060b14', border: '1px solid #69f0ae33', borderRadius: 4, marginBottom: 28 }}>
              <div style={{ fontSize: 11, color: '#5a7a9a', marginBottom: 12, letterSpacing: '0.1em' }}>COMPLETION CERTIFICATE</div>
              <div style={{ fontSize: 13, color: '#c8d6e5', lineHeight: 1.8 }}>
                <div><span style={{ color: '#5a7a9a' }}>Student:</span> {studentName}</div>
                <div><span style={{ color: '#5a7a9a' }}>Login ID:</span> {studentEmail}</div>
                <div><span style={{ color: '#5a7a9a' }}>Course:</span> Data Center Technician Fundamentals</div>
                <div><span style={{ color: '#5a7a9a' }}>Score:</span> {totalCorrect} / {TOTAL_QUESTIONS} ({Math.round((totalCorrect / TOTAL_QUESTIONS) * 100)}%)</div>
                <div><span style={{ color: '#5a7a9a' }}>Lessons:</span> {completedCount} of 15 complete</div>
                <div><span style={{ color: '#5a7a9a' }}>Date:</span> {new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</div>
                <div><span style={{ color: '#5a7a9a' }}>Provider:</span> TechCatchUp Courses</div>
              </div>
            </div>
            <button className="btn-primary" onClick={() => setView('dashboard')} style={{ padding: '12px 28px', fontSize: 13, borderRadius: 2 }}>← BACK TO CURRICULUM</button>
          </div>
        )}
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

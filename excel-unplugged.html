            "Imagine a Client Directory sheet with Client ID numbers and Client Names.",

          ]},
          { type: "heading", text: "VLOOKUP — The Classic Option" },
          { type: "bullets", items: [
            "VLOOKUP stands for 'Vertical Lookup' — it searches down a column to find a match.",
            "Structure: =VLOOKUP(lookup_value, table_array, col_index_num, [range_lookup])",
            "lookup_value = what you're searching for (e.g., the Client ID)",
            "table_array = the full range containing both the ID column and the Name column",
            "col_index_num = which column (counting from the left of the table_array) holds the answer you want"

          { type: "heading", text: "XLOOKUP — The Modern Option" },
          { type: "bullets", items: [
            "XLOOKUP is a newer, more flexible version of the same idea.",
            "Structure: =XLOOKUP(lookup_value, lookup_array, return_array)",
            "lookup_array = the range where the ID is listed (where you're searching)",
            "return_array = the range where the actual answer (the name) is listed",
            "XLOOKUP is often easier to read because you specify exactly where to look and exactly what to return, instead of counting columns."
          ]},
          { type: "heading", text: "If the Source Data Changes" },
          { type: "bullets", items: [
            "If the Retail Price in the master spreadsheet changes, every formula that references it — Total Sales, Total Profit, Profit Margin — updates automatically.",

          ]}
        ],
        quiz: [
          { q: "What does VLOOKUP stand for and what does it search?", options: [
            "Variable Lookup — searches randomly through a sheet",
            "Vertical Lookup — searches down a column to find a match",

            "Visual Lookup — searches images, not data"
          ], correct: 1 },
          { q: "In an XLOOKUP formula, what is the 'return_array'?", options: [

            "Retyping is required for legal compliance",

            "It avoids typos and automatically stays correct if the source directory changes",
            "Lookup formulas only work with client data, nothing else"
          ], correct: 2 },
          { q: "If the Retail Price changes in a master spreadsheet, what happens to formulas elsewhere that reference that price (like Total Sales or Profit)?", options: [
            "Nothing happens unless someone manually updates each formula",
            "They automatically recalculate using the new price",
            "They break and show an error",
            "Only the Total Sales formula updates, not Profit"
          ], correct: 1 }
        ]
      },
      {
        day: 8, title: "Choosing the Right Formula", duration: "20 min", xp: 100,
        tag: "BUSINESS",
        content: [
          { type: "intro", text: "The hardest part of using spreadsheets isn't typing a formula correctly — it's recognizing which formula a situation actually calls for. This final lesson is a review built entirely around real-world scenarios." },
          { type: "heading", text: "A Quick Decision Guide" },
          { type: "table", headers: ["If you need to...", "Use this formula"], rows: [
            ["Add up a list of numbers", "SUM"],
            ["Find the mean/typical value", "AVERAGE"],
            ["Find the single highest value", "MAX"],
            ["Find the single lowest value", "MIN"],
            ["Multiply two values (like price × quantity)", "Basic multiplication (*)"],
            ["Pull matching info from another table", "VLOOKUP or XLOOKUP"],
          ]},
          { type: "heading", text: "Business Vocabulary Recap" },
          { type: "bullets", items: [
            "**Revenue** = Price × Quantity (all money collected)",
            "**Cost** = Wholesale Price × Quantity (what the business paid)",
            "**Profit** = Revenue − Cost (what's left over)",
            "**Profit Margin** = Profit ÷ Revenue (efficiency, as a % of sales)",
            "**ROI** = Profit ÷ Cost (efficiency, as a % of what was spent)"
          ]},
          { type: "heading", text: "Putting It All Together" },
          { type: "bullets", items: [

          ], correct: 3 },

          ], correct: 2 },

const allLessons = curriculum.flatMap(m => m.lessons);
const TOTAL_QUESTIONS = allLessons.reduce((sum, l) => sum + l.quiz.length, 0);
function renderContent(blocks) {
  return blocks.map((block, i) => {
    if (block.type === 'intro') return (
      <p key={i} style={{ fontSize: 13, lineHeight: 1.8, color: '#a0c8b4', marginBottom: 20, paddingBottom: 16, borderBottom: `1px solid #1a3328` }}>{block.text}</p>
    );
    if (block.type === 'heading') return (
      <p key={i} style={{ fontWeight: 700, color: ACCENT, marginTop: 20, marginBottom: 8, fontSize: 13, letterSpacing: '0.04em' }}>▸ {block.text}</p>
    );
    if (block.type === 'bullets') return (
      <ul key={i} style={{ listStyle: 'none', marginBottom: 12 }}>
        {block.items.map((item, j) => {
          const parts = item.split(/\*\*(.*?)\*\*/g);
          return (
            <li key={j} style={{ display: 'flex', gap: 8, marginBottom: 5, fontSize: 13, lineHeight: 1.6 }}>
              <span style={{ color: GREEN, flexShrink: 0, marginTop: 1 }}>›</span>
              <span style={{ color: '#c8e0d4' }}>
                {parts.map((p, k) => k % 2 === 1
                  ? <strong key={k} style={{ color: ACCENT }}>{p}</strong>
                  : p
                )}
              </span>
            </li>
          );
        })}
      </ul>
    );
    if (block.type === 'table') return (
      <div key={i} style={{ overflowX: 'auto', marginBottom: 16 }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
          <thead>
            <tr>
              {block.headers.map((h, j) => (
                <th key={j} style={{ padding: '8px 12px', textAlign: 'left', background: GREEN_BG, color: ACCENT, borderBottom: `2px solid ${GREEN}`, fontWeight: 700, whiteSpace: 'nowrap' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {block.rows.map((row, j) => (
              <tr key={j} style={{ borderBottom: '1px solid #1a3328' }}>
                {row.map((cell, k) => (
                  <td key={k} style={{ padding: '7px 12px', color: k === 0 ? '#7ab494' : '#c8e0d4', verticalAlign: 'top' }}>{cell}</td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
    return null;
  });
}

function App() {
  const [currentLesson, setCurrentLesson] = useState(null);
  const [completedLessons, setCompletedLessons] = useState({});
  const [quizIndex, setQuizIndex] = useState(0);
  const [selectedOption, setSelectedOption] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [totalXP, setTotalXP] = useState(0);
  const [totalCorrect, setTotalCorrect] = useState(0);
  const [view, setView] = useState('signin');
  const [formSubmitted, setFormSubmitted] = useState(false);
  const [formError, setFormError] = useState('');
  const [studentEmail, setStudentEmail] = useState('');
  const [studentDisplayName, setStudentDisplayName] = useState('');
  const [signinError, setSigninError] = useState('');
  const [lastLessonSubmitStatus, setLastLessonSubmitStatus] = useState(null);
  const [lessonCorrectCount, setLessonCorrectCount] = useState(0);

  const completedCount = Object.keys(completedLessons).length;
  const progress = (completedCount / allLessons.length) * 100;
  const allDone = completedCount === allLessons.length;

  // ── GOOGLE SIGN-IN (silent, picks up existing Chromebook session) ──
  useEffect(() => {
    function decodeJwt(token) {
      try {
        const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        return JSON.parse(decodeURIComponent(atob(base64).split('').map(c =>
          '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
        ).join('')));
      } catch (err) { return null; }
    }

    function handleCredentialResponse(response) {
      const payload = decodeJwt(response.credential);
      if (payload && payload.email) {
        const emailDomain = payload.email.split('@')[1] || '';
        if (emailDomain.toLowerCase() !== ALLOWED_EMAIL_DOMAIN) {
          setSigninError(`This course is only available to MCRSD accounts. Signed in as ${payload.email}, which is not an @${ALLOWED_EMAIL_DOMAIN} account.`);
          if (window.google && window.google.accounts && window.google.accounts.id) {
            window.google.accounts.id.disableAutoSelect();
          }
          return;
        }
        setStudentEmail(payload.email);
        setStudentDisplayName(payload.name || payload.email);
        setSigninError('');
        setView('dashboard');
      } else {
        setSigninError('We could not verify your Google account. Please try again or ask your instructor for help.');
      }
    }

    function initGsi() {
      if (window.google && window.google.accounts && window.google.accounts.id) {
        window.google.accounts.id.initialize({
          client_id: GOOGLE_OAUTH_CLIENT_ID,
          callback: handleCredentialResponse,
          auto_select: true
        });
        const btnContainer = document.getElementById('gsiButtonContainer');
        if (btnContainer) {
          window.google.accounts.id.renderButton(btnContainer, {
            theme: 'filled_black', size: 'large', text: 'signin_with', shape: 'pill', width: 280
          });
        }
        window.google.accounts.id.prompt();
      } else {
        setTimeout(initGsi, 300);
      }
    }
    if (view === 'signin') initGsi();
  }, [view]);

  const openLesson = (lesson) => {
    setCurrentLesson(lesson);
    setQuizIndex(0);
    setSelectedOption(null);
    setAnswered(false);
    setLessonCorrectCount(0);
    setView('lesson');
  };

  const startQuiz = () => {
    setQuizIndex(0);
    setSelectedOption(null);
    setAnswered(false);
    setLessonCorrectCount(0);
    setView('quiz');
  };

  const handleOptionSelect = (idx) => {
    if (answered) return;
    setSelectedOption(idx);
    setAnswered(true);
    const correct = idx === currentLesson.quiz[quizIndex].correct;
    if (correct) {
      setTotalCorrect(c => c + 1);
      setLessonCorrectCount(c => c + 1);
    }
  };

  const postToGoogleForm = async (fieldValues) => {
    const cfg = GOOGLE_FORM_CONFIG;
    const formUrl = `https://docs.google.com/forms/d/e/${cfg.formId}/formResponse`;
    const params = new URLSearchParams(fieldValues);
    await fetch(formUrl, { method: 'POST', mode: 'no-cors', body: params });
  };

  const submitLessonResult = async (lesson, lessonCorrectCount, cumulativeCorrect) => {
    try {
      await postToGoogleForm({
        [GOOGLE_FORM_CONFIG.fields.studentEmail]: studentEmail,
        [GOOGLE_FORM_CONFIG.fields.studentDisplayName]: studentDisplayName,
        [GOOGLE_FORM_CONFIG.fields.courseName]: COURSE_NAME,
        [GOOGLE_FORM_CONFIG.fields.lessonNumber]: String(lesson.day),
        [GOOGLE_FORM_CONFIG.fields.lessonTitle]: lesson.title,
        [GOOGLE_FORM_CONFIG.fields.lessonScore]: `${lessonCorrectCount}/${lesson.quiz.length}`,
        [GOOGLE_FORM_CONFIG.fields.cumulativeScore]: `${cumulativeCorrect}/${TOTAL_QUESTIONS}`,
        [GOOGLE_FORM_CONFIG.fields.sessionTimestamp]: new Date().toLocaleString('en-US')
      });
      setLastLessonSubmitStatus('ok');
    } catch (err) {
      console.error('Lesson submission failed:', err);
      setLastLessonSubmitStatus('fail');
    }
  };

  const submitFinalSummary = async () => {
    try {
      await postToGoogleForm({
        [GOOGLE_FORM_CONFIG.fields.studentEmail]: studentEmail,
        [GOOGLE_FORM_CONFIG.fields.studentDisplayName]: studentDisplayName,
        [GOOGLE_FORM_CONFIG.fields.courseName]: COURSE_NAME,
        [GOOGLE_FORM_CONFIG.fields.lessonNumber]: "FINAL",
        [GOOGLE_FORM_CONFIG.fields.lessonTitle]: "Course Complete — Final Summary",
        [GOOGLE_FORM_CONFIG.fields.lessonScore]: `${totalCorrect}/${TOTAL_QUESTIONS}`,
        [GOOGLE_FORM_CONFIG.fields.cumulativeScore]: `${totalCorrect}/${TOTAL_QUESTIONS}`,
        [GOOGLE_FORM_CONFIG.fields.sessionTimestamp]: new Date().toLocaleString('en-US')
      });
      setFormSubmitted(true);
    } catch (err) {
      setFormError('Submission failed. Please tell your instructor your name and score.');
    }
  };

  const nextQuestion = () => {
    if (quizIndex < currentLesson.quiz.length - 1) {
      setQuizIndex(q => q + 1);
      setSelectedOption(null);
      setAnswered(false);
    } else {
      const alreadyCompleted = !!completedLessons[currentLesson.day];
      if (!alreadyCompleted) {
        setCompletedLessons(p => ({ ...p, [currentLesson.day]: true }));
        setTotalXP(x => x + currentLesson.xp);
        submitLessonResult(currentLesson, lessonCorrectCount, totalCorrect);
      } else {
        setLastLessonSubmitStatus(null);
      }
      setView('complete');
    }
  };

  // ── SIGN IN ──
  if (view === 'signin') return (
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", background: '#0a120e', minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
      <div className="gsi-signin-card">
        <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 11, letterSpacing: '0.25em', color: '#1d9e7599', marginBottom: 6 }}>TECH CATCH UP COURSES</div>
        <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 20, fontWeight: 900, color: ACCENT, marginBottom: 18 }}>EXCEL UNPLUGGED</div>
        <div style={{ fontSize: 12, color: '#7ab494', marginBottom: 24, lineHeight: 1.7 }}>
          Sign in with your school Google account to begin.<br/>If you're already signed in on this Chromebook, this should happen automatically.
        </div>
        <div id="gsiButtonContainer" style={{ display: 'flex', justifyContent: 'center', marginBottom: 16 }}></div>
        {signinError && (
          <div style={{ marginTop: 12, padding: '10px 14px', background: '#2a0a0a', border: '1px solid #ff174444', borderRadius: 4, fontSize: 12, color: '#ff8a80' }}>{signinError}</div>
        )}
        <div style={{ marginTop: 24, fontSize: 11, color: '#3a5a4a' }}>Having trouble signing in? Ask your instructor for help.</div>
      </div>
    </div>
  );

  // ── DASHBOARD ──
  if (view === 'dashboard') return (
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", background: '#0a120e', minHeight: '100vh', color: '#c8e0d4' }}>
      <div style={{ background: '#0d1a14', borderBottom: '1px solid #1d9e7522', padding: '20px 24px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 12 }}>
          <div>
            <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 10, letterSpacing: '0.3em', color: '#1d9e7599', marginBottom: 4 }}>TECH CATCH UP COURSES</div>
            <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 22, fontWeight: 900, color: ACCENT, letterSpacing: '0.04em' }}>EXCEL UNPLUGGED</div>
            <div style={{ fontSize: 11, color: '#3a5a4a', marginTop: 3 }}>Spreadsheet & Business Math · 8 Lessons</div>
            <div style={{ fontSize: 11, color: '#3a5a4a', marginTop: 4 }}>Signed in as {studentDisplayName || studentEmail}</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 10, color: '#3a5a4a', letterSpacing: '0.1em' }}>TOTAL XP</div>
            <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 30, fontWeight: 900, color: GREEN }}>{totalXP}</div>
            <div style={{ fontSize: 11, color: '#3a5a4a' }}>{completedCount} / {allLessons.length} complete</div>
          </div>
        </div>
        <div style={{ marginTop: 14, height: 3, background: '#1a3328', borderRadius: 2, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${progress}%`, background: `linear-gradient(90deg, ${GREEN}, ${ACCENT})`, transition: 'width 0.5s ease' }} />

        <div style={{ display: 'flex', gap: 16, marginTop: 10 }}>
          <span style={{ fontSize: 10, color: '#4a7a64' }}>
            <span style={{ background: GREEN_BG, color: ACCENT, padding: '2px 6px', borderRadius: 2, marginRight: 6, border: `1px solid ${GREEN}44` }}>UNPLUGGED</span>
            Pencil & calculator
          </span>
          <span style={{ fontSize: 10, color: '#4a7a64' }}>
            <span style={{ background: '#241a0a', color: '#e0a96a', padding: '2px 6px', borderRadius: 2, marginRight: 6, border: '1px solid #e0a96a44' }}>BUSINESS</span>
            Business math & lookups
          </span>
        </div>
      </div>

      <div style={{ padding: '20px 24px', maxWidth: 960, margin: '0 auto' }}>
        {curriculum.map(mod => (
          <div key={mod.module} style={{ marginBottom: 32 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>

          </div>

      </div>

  if (view === 'lesson' && currentLesson) return (
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", background: '#0a120e', minHeight: '100vh', color: '#c8e0d4' }}>
      <div style={{ background: '#0d1a14', borderBottom: '1px solid #1d9e7522', padding: '14px 24px', display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap' }}>

          <button className="btn-primary" onClick={startQuiz} style={{ padding: '10px 24px', fontSize: 13, borderRadius: 2, width: '100%' }}>TEST YOUR KNOWLEDGE →</button>
        </div>

    const q = currentLesson.quiz[quizIndex];
    return (
      <div style={{ fontFamily: "'IBM Plex Mono', monospace", background: '#0a120e', minHeight: '100vh', color: '#c8e0d4' }}>

          <span style={{ fontSize: 12, color: '#3a5a4a' }}>{quizIndex + 1} / {currentLesson.quiz.length}</span>
        </div>
        <div style={{ maxWidth: 620, margin: '60px auto', padding: '0 24px' }}>
          <div style={{ fontSize: 10, letterSpacing: '0.2em', color: '#1d9e7566', marginBottom: 20 }}>QUESTION {quizIndex + 1}</div>
          <div style={{ fontSize: 16, fontWeight: 600, color: '#c8e0d4', lineHeight: 1.5, marginBottom: 28 }}>{q.q}</div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 24 }}>
            {q.options.map((opt, idx) => {
              const isCorrect = idx === q.correct;
              const isSelected = idx === selectedOption;
              let bg = '#0d1a14', border = '#1a3328', color = '#c8e0d4';
              if (answered) {
                if (isCorrect) { bg = '#0a2a1a'; border = '#6abf69'; color = '#6abf69'; }
                else if (isSelected) { bg = '#2a0a0a'; border = '#ff1744'; color = '#ff8a80'; }
              }
              return (
                <button key={idx} className={`quiz-option ${answered ? 'locked' : ''}`}
                  onClick={() => handleOptionSelect(idx)}
                  disabled={answered}
                  style={{ padding: '14px 18px', borderRadius: 4, border: `1px solid ${border}`, background: bg, color: color, fontSize: 14, fontFamily: "'IBM Plex Mono', monospace", display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ fontWeight: 700, opacity: 0.6 }}>{String.fromCharCode(65 + idx)}</span>
                  <span>{opt}</span>
                  {answered && isCorrect && <span style={{ marginLeft: 'auto' }}>✓</span>}
                  {answered && isSelected && !isCorrect && <span style={{ marginLeft: 'auto' }}>✗</span>}
                </button>
              );
            })}
          </div>

          {answered && (
            <button className="btn-primary" onClick={nextQuestion} style={{ padding: '12px 28px', fontSize: 13, borderRadius: 2, width: '100%' }}>
              {quizIndex < currentLesson.quiz.length - 1 ? 'NEXT QUESTION →' : 'COMPLETE LESSON ✓'}
            </button>
          )}
        </div>
      </div>
    );
  }

  // ── LESSON COMPLETE ──
  if (view === 'complete') {
    const wasFirstCompletion = lastLessonSubmitStatus !== null;
    return (
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", background: '#0a120e', minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ textAlign: 'center', padding: 40, maxWidth: 480 }}>
        <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 52, color: GREEN, marginBottom: 12 }}>✓</div>
        <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 18, color: ACCENT, marginBottom: 8 }}>LESSON COMPLETE</div>
        <div style={{ fontSize: 13, color: '#7ab494', marginBottom: 4 }}>{currentLesson?.title}</div>
        <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 34, color: '#7ce0bb', margin: '20px 0' }}>+{currentLesson?.xp} XP</div>
        <div style={{ fontSize: 12, color: '#3a5a4a', marginBottom: 8 }}>Overall Score: {totalCorrect} / {TOTAL_QUESTIONS} correct</div>
        <div style={{ fontSize: 12, color: '#3a5a4a', marginBottom: 12 }}>{completedCount} / {allLessons.length} lessons complete</div>
        {wasFirstCompletion && (
          <div style={{ fontSize: 11, color: lastLessonSubmitStatus === 'fail' ? '#ff8a80' : '#3a5a4a', marginBottom: 24 }}>
            {lastLessonSubmitStatus === 'fail'
              ? '⚠ Progress could not be recorded automatically — tell your instructor your score for this lesson.'
              : '✓ Progress recorded automatically'}
          </div>
        )}
        {completedCount === allLessons.length && (
          <div style={{ marginBottom: 20, padding: '12px', background: '#0a2a1a', border: '1px solid #6abf6944', borderRadius: 4 }}>
            <div style={{ fontSize: 12, color: '#6abf69', marginBottom: 8 }}>🎓 All lessons complete! View your final certificate.</div>
            <button className="btn-primary" onClick={() => setView('submit')} style={{ padding: '8px 20px', fontSize: 12, borderRadius: 2, background: '#6abf69', color: '#0a120e' }}>VIEW CERTIFICATE →</button>
          </div>
        )}
        <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
          <button className="btn-primary" onClick={() => setView('dashboard')} style={{ padding: '12px 28px', fontSize: 13, borderRadius: 2 }}>← CURRICULUM</button>
          {currentLesson && currentLesson.day < allLessons.length && (
            <button className="btn-primary" onClick={() => openLesson(allLessons[currentLesson.day])} style={{ padding: '12px 28px', fontSize: 13, borderRadius: 2, background: ACCENT, color: '#0a120e' }}>
              NEXT LESSON →
            </button>
          )}
        </div>
      </div>
    </div>
  );
  }

  // ── FINAL CERTIFICATE / SUMMARY SUBMISSION ──
  if (view === 'submit') return (
    <div style={{ fontFamily: "'IBM Plex Mono', monospace", background: '#0a120e', minHeight: '100vh', color: '#c8e0d4' }}>
      <div style={{ borderBottom: '1px solid #1d9e7522', padding: '14px 24px', background: '#0d1a14', display: 'flex', alignItems: 'center', gap: 16 }}>
        <button className="btn-ghost" onClick={() => setView('dashboard')} style={{ padding: '6px 12px', fontSize: 11, borderRadius: 2 }}>← BACK</button>
        <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 14, color: ACCENT }}>COURSE COMPLETE</div>
      </div>

      <div style={{ maxWidth: 560, margin: '40px auto', padding: '0 24px' }}>
        {!formSubmitted ? (
          <>
            <div style={{ marginBottom: 32, padding: '20px', background: '#0d1a14', border: '1px solid #1d9e7522', borderRadius: 4 }}>
              <div style={{ fontSize: 10, color: '#1d9e7566', letterSpacing: '0.15em', marginBottom: 12 }}>YOUR RESULTS SUMMARY</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                <div style={{ padding: '10px', background: '#102018', borderRadius: 4, textAlign: 'center' }}>
                  <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 24, color: GREEN }}>{totalCorrect}/{TOTAL_QUESTIONS}</div>
                  <div style={{ fontSize: 10, color: '#3a5a4a', marginTop: 4 }}>QUESTIONS CORRECT</div>
                </div>
                <div style={{ padding: '10px', background: '#102018', borderRadius: 4, textAlign: 'center' }}>
                  <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 24, color: ACCENT }}>{Math.round((totalCorrect / TOTAL_QUESTIONS) * 100)}%</div>
                  <div style={{ fontSize: 10, color: '#3a5a4a', marginTop: 4 }}>FINAL SCORE</div>
                </div>
                <div style={{ padding: '10px', background: '#102018', borderRadius: 4, textAlign: 'center' }}>
                  <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 24, color: GREEN }}>{totalXP}</div>
                  <div style={{ fontSize: 10, color: '#3a5a4a', marginTop: 4 }}>TOTAL XP EARNED</div>
                </div>
                <div style={{ padding: '10px', background: '#102018', borderRadius: 4, textAlign: 'center' }}>
                  <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 24, color: '#6abf69' }}>{completedCount}/8</div>
                  <div style={{ fontSize: 10, color: '#3a5a4a', marginTop: 4 }}>LESSONS COMPLETE</div>
                </div>
              </div>
            </div>

            <div style={{ marginBottom: 20, padding: '10px 14px', background: '#0d1a14', border: '1px solid #1a3328', borderRadius: 4, fontSize: 11, color: '#3a5a4a', lineHeight: 1.6 }}>
              Signed in as <strong style={{ color: '#7ab494' }}>{studentDisplayName || studentEmail}</strong>. Your verified school account, score, and lesson completion record will be submitted for course credit. No additional personal information is collected.
            </div>

            {formError && <div style={{ marginBottom: 16, padding: '10px 14px', background: '#2a0a0a', border: '1px solid #ff174444', borderRadius: 4, fontSize: 12, color: '#ff8a80' }}>{formError}</div>}

            <button className="btn-primary" onClick={submitFinalSummary} style={{ padding: '12px', fontSize: 13, borderRadius: 2, width: '100%' }}>
              SUBMIT FINAL RESULTS →
            </button>
          </>
        ) : (
          <div style={{ textAlign: 'center', padding: '40px 20px' }}>
            <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 52, color: '#6abf69', marginBottom: 16 }}>🎓</div>
            <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 20, color: '#6abf69', marginBottom: 12 }}>SUBMISSION COMPLETE</div>
            <div style={{ fontSize: 13, color: '#7ab494', marginBottom: 24, lineHeight: 1.7 }}>
              Your results have been submitted successfully.<br/>
              <strong style={{ color: '#c8e0d4' }}>{studentDisplayName}</strong> · {studentEmail}
            </div>
            <div style={{ padding: '20px', background: '#0d1a14', border: '1px solid #6abf6933', borderRadius: 4, marginBottom: 28 }}>
              <div style={{ fontSize: 11, color: '#3a5a4a', marginBottom: 12, letterSpacing: '0.1em' }}>COMPLETION CERTIFICATE</div>
              <div style={{ fontSize: 13, color: '#c8e0d4', lineHeight: 1.8 }}>
                <div><span style={{ color: '#3a5a4a' }}>Student:</span> {studentDisplayName}</div>
                <div><span style={{ color: '#3a5a4a' }}>School Account:</span> {studentEmail}</div>
                <div><span style={{ color: '#3a5a4a' }}>Course:</span> {COURSE_NAME}</div>
                <div><span style={{ color: '#3a5a4a' }}>Score:</span> {totalCorrect} / {TOTAL_QUESTIONS} ({Math.round((totalCorrect / TOTAL_QUESTIONS) * 100)}%)</div>
                <div><span style={{ color: '#3a5a4a' }}>Lessons:</span> {completedCount} of 8 complete</div>
                <div><span style={{ color: '#3a5a4a' }}>Date:</span> {new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</div>
                <div><span style={{ color: '#3a5a4a' }}>Provider:</span> TechCatchUp Courses</div>
              </div>
            </div>
            <button className="btn-primary" onClick={() => setView('dashboard')} style={{ padding: '12px 28px', fontSize: 13, borderRadius: 2 }}>← BACK TO CURRICULUM</button>
          </div>
        )}
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- ============== LOCKDOWN MODULE: copy/select/devtools event blocking ============== -->
<script id="lockdown-script">
(function () {
  'use strict';
  function isFormField(el) {
    if (!el || !el.tagName) return false;
    const tag = el.tagName.toUpperCase();
    return tag === 'INPUT' || tag === 'TEXTAREA' || el.isContentEditable;
  }
  document.addEventListener('contextmenu', function (e) {
    if (!isFormField(e.target)) e.preventDefault();
  }, false);
  ['copy', 'cut'].forEach(function (evtName) {
    document.addEventListener(evtName, function (e) {
      if (!isFormField(e.target)) {
        e.preventDefault();
        if (e.clipboardData) e.clipboardData.setData('text/plain', '');
      }
    }, false);
  });
  document.addEventListener('dragstart', function (e) {
    if (!isFormField(e.target)) e.preventDefault();
  }, false);
  document.addEventListener('keydown', function (e) {
    const k = e.key ? e.key.toLowerCase() : '';
    const ctrlOrCmd = e.ctrlKey || e.metaKey;
    if (isFormField(e.target)) {
      if (e.key === 'F12' || (ctrlOrCmd && e.shiftKey && ['i','j','c'].includes(k)) || (ctrlOrCmd && k === 'u')) {
        e.preventDefault();
      }
      return;
    }
    if (ctrlOrCmd && ['a','c','x','s','p'].includes(k)) e.preventDefault();
    if (e.key === 'F12' || (ctrlOrCmd && e.shiftKey && ['i','j','c'].includes(k)) || (ctrlOrCmd && k === 'u')) {
      e.preventDefault();
    }
  }, false);
  const observer = new MutationObserver(function () {
    document.querySelectorAll('input, textarea, [contenteditable="true"]').forEach(function (el) {
      el.style.userSelect = 'text';
    });
  });
  observer.observe(document.body, { childList: true, subtree: true });
})();
</script>
